services:
  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    env_file: server/.env
    environment:
      TZ: ${TZ:-Europe/Moscow}
    volumes:
      - tracker-data:/app/server/data

  web:
    build:
      context: .
      target: web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-localhost}
    volumes:
      - caddy-data:/data
      - caddy-config:/config

volumes:
  tracker-data:
  caddy-data:
  caddy-config:
