services:
  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    env_file: server/.env
    environment:
      TZ: ${TZ:-Europe/Moscow}
      # IPv6-адрес хоста периодически становится deprecated (DHCPv6 не продлевает
      # preferred lifetime), из-за чего система сортирует IPv4 выше, а IPv4 Telegram
      # заблокирован хостингом. Форсируем IPv6-первым — путь в Telegram только такой.
      NODE_OPTIONS: --dns-result-order=ipv6first
    volumes:
      - tracker-data:/app/server/data
    # Сеть хоста: хостинг блокирует IPv4-диапазоны Telegram, а IPv6 у хоста работает.
    # Docker-бридж не маскарадит v6 корректно, поэтому api живёт в сетевом стеке хоста.
    network_mode: host

  web:
    build:
      context: .
      target: web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-localhost}
      API_UPSTREAM: host.docker.internal:3001
      FOXGEAR_SITE_ADDRESS: ${FOXGEAR_SITE_ADDRESS:-foxgear.localhost}
      # Дефолт — прод-домен: переменную в .env добавлять не нужно
      GYM_SITE_ADDRESS: ${GYM_SITE_ADDRESS:-gym.85-239-41-8.sslip.io}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
      # Дневник тренировок: статика лежит на хосте, обновляется rsync'ом
      - /opt/gym-diary/dist:/srv-gym:ro
    # Второй сайт Caddy — дашборд Foxgear из соседнего compose-проекта:
    # подключаемся к его сети, чтобы резолвить сервис `dashboard` по DNS.
    networks:
      - default
      - foxgear

  # Расшифровка голосовых для Telegram-бота (Whisper на CPU).
  # Порт открыт только на localhost хоста — api (network_mode: host) ходит на 127.0.0.1:8081.
  stt:
    build: deploy/stt
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - stt-models:/root/.cache

volumes:
  tracker-data:
  caddy-data:
  caddy-config:
  stt-models:

networks:
  foxgear:
    external: true
    name: foxgear-platform_default
